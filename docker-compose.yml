services:
  constructor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/app/data/constructor.db
    volumes:
      - ./Constructor/constructor.db:/app/data/constructor.db
      - ./Constructor/wwwroot/uploads:/app/wwwroot/uploads
    restart: unless-stopped
